name: NEWIFI 3

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  push:
    branches:
      - master
    paths:
      - 'newifi3.config'
      - 'feeds.conf.default'
      - 'DIY/diy-part2-d2.sh'
      - 'Scripts/build-newifi-d2-passwall2.sh'
      - '.github/workflows/newifi3.yml'
#  schedule:
#    - cron: 0 8 * * 5
  watch:
    types: started

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  #REPO_BRANCH: openwrt-21.02
  REPO_BRANCH: openwrt-23.05
  #REPO_URL: https://github.com/Lienol/openwrt
  #REPO_BRANCH: 22.03
  #REPO_BRANCH: 23.05
  FEEDS_CONF: feeds.conf.default
  PRODUCT_NAME: Newifi-D2-PassWall2-Minimal
  CONFIG_FILE: newifi3.config
  DIY_P1_SH: DIY/diy-part1-d2-passwall2.sh
  DIY_P2_SH: DIY/diy-part2-d2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL git.io/depends-ubuntu-latest)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Prune incompatible PassWall Go cores
      run: |
        cd openwrt
        rm -rf \
          feeds/passwall_packages/xray-core \
          feeds/passwall_packages/sing-box
        if [ -d feeds/passwall_packages/xray-core ] || [ -d feeds/passwall_packages/sing-box ]; then
          echo "::error::Failed to remove PassWall main-branch xray-core/sing-box packages before feeds install."
          exit 1
        fi

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Verify PassWall package set
      run: |
        cd openwrt
        for pkg in geoview xray-core sing-box; do
          if [ ! -d "package/feeds/passwall_packages/$pkg" ]; then
            echo "::error::Missing package/feeds/passwall_packages/$pkg after feeds install. Check feeds.conf.default pin."
            exit 1
          fi
        done
        if [ ! -d package/feeds/passwall2/luci-app-passwall2 ]; then
          echo "::error::Missing luci-app-passwall2 after feeds install."
          exit 1
        fi

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
#    - name: SSH connection to Actions
#      uses: P3TERX/ssh2actions@v1.0.0
#      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
#      env:
#        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
#        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j2 || make -j2 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "FILE_NAME=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DATE=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        
    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      run: |
        TARGET_DIR="$(find openwrt/bin/targets -mindepth 2 -maxdepth 2 -type d | head -n 1)"
        if [ -z "$TARGET_DIR" ] || ! find "$TARGET_DIR" -maxdepth 1 -type f \( -name '*.bin' -o -name '*.img' -o -name '*.gz' \) | grep -q .; then
          echo "::error::Build finished without firmware images under openwrt/bin/targets; check the compile log above for the first make error."
          exit 1
        fi
        cd "$TARGET_DIR"
        rm -rf packages config.buildinfo feeds.buildinfo sha256sums version.buildinfo *.manifest Packages.tar.gz
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

