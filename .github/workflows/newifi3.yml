    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@v1
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: Newifi D2 PassWall2 Minimal ${{ env.DATE }}
        tag: newifi-d2-passwall2${{ env.FILE_NAME }}
        artifacts: ${{ env.FIRMWARE }}/*
        allowUpdates: true
        removeArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          * Newifi D2 极简固件：LuCI + PassWall2 + xray-core + sing-box
          * 默认 LAN IP：192.168.2.1，Hostname：Newifi-D2
          * feeds.conf.default 已加入 passwall_packages 与 passwall2 feed
